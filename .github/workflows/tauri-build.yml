# =============================================================================
# SlalomStream — Tauri desktop build (Windows only)
#
# Triggers:
#   - Push of a `v*` tag (e.g. `v2.1.0`) → cuts a full signed release
#   - Manual dispatch (workflow_dispatch) → for test builds, with optional
#     unsigned bypass so the pipeline can be validated before certs are set up
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#
#   Tauri updater signing (REQUIRED — build will fail without these):
#     TAURI_SIGNING_PRIVATE_KEY          — ed25519 private key (from `pnpm tauri signer generate`)
#     TAURI_SIGNING_PRIVATE_KEY_PASSWORD — passphrase for the private key
#     TAURI_SIGNING_PUBLIC_KEY           — matching public key (injected into tauri.conf.json)
#
#   macOS code signing (optional — unsigned build produced if absent):
#     APPLE_CERTIFICATE                  — base64-encoded .p12 certificate
#     APPLE_CERTIFICATE_PASSWORD         — .p12 password
#     APPLE_SIGNING_IDENTITY             — e.g. "Developer ID Application: Your Name (TEAMID)"
#     APPLE_ID                           — Apple ID email for notarisation
#     APPLE_PASSWORD                     — App-specific password for notarisation
#     APPLE_TEAM_ID                      — Apple Developer Team ID
#
#   Windows code signing (optional — unsigned build produced if absent):
#     WINDOWS_CERTIFICATE                — base64-encoded .pfx certificate
#     WINDOWS_CERTIFICATE_PASSWORD       — .pfx password
#
# To generate Tauri signing keys (run once, locally):
#   pnpm tauri signer generate
# Copy the output into GitHub Secrets as described above.
# =============================================================================

name: Tauri Build

on:
  workflow_dispatch:
    inputs:
      unsigned:
        description: "Build UNSIGNED test installer (no code-signing certs required — for pipeline testing only, DO NOT distribute)"
        type: boolean
        required: false
        default: false
  push:
    tags:
      - "v*"

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: ""
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: ${{ matrix.target || 'default' }}-${{ hashFiles('src-tauri/Cargo.toml') }}

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Download FFmpeg sidecar
        run: node scripts/download-ffmpeg.mjs ${{ matrix.target }}

      - name: Download cloudflared sidecar
        run: node scripts/download-cloudflared.mjs ${{ matrix.target }}

      # ── Tauri updater signing key ─────────────────────────────────────────
      # The public key is injected into tauri.conf.json at build time.
      # On unsigned test builds (workflow_dispatch with unsigned=true), we
      # generate a throwaway keypair so the build completes without needing
      # real secrets configured.
      - name: Inject updater public key
        shell: bash
        env:
          TAURI_SIGNING_PUBLIC_KEY: ${{ secrets.TAURI_SIGNING_PUBLIC_KEY }}
          ALLOW_UNSIGNED: ${{ inputs.unsigned == true && '1' || '' }}
        run: |
          if [[ -n "$TAURI_SIGNING_PUBLIC_KEY" ]]; then
            echo "Injecting TAURI_SIGNING_PUBLIC_KEY into tauri.conf.json"
            node -e "
              const fs = require('fs');
              const cfg = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
              cfg.plugins.updater.pubkey = process.env.TAURI_SIGNING_PUBLIC_KEY;
              fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(cfg, null, 2));
              console.log('Updater public key injected.');
            "
          elif [[ -n "$ALLOW_UNSIGNED" ]]; then
            echo "::warning::TAURI_SIGNING_PUBLIC_KEY not set — generating throwaway keypair for unsigned test build."
            # Generate a throwaway keypair. The resulting installer will not verify
            # updates correctly and MUST NOT be distributed to users.
            THROWAWAY=$(pnpm tauri signer generate --ci 2>&1 || true)
            PUBKEY=$(echo "$THROWAWAY" | grep -oP 'Public key:?\s*\K\S+' | head -1 || echo "")
            PRIVKEY=$(echo "$THROWAWAY" | grep -oP 'Private key:?\s*\K\S+' | head -1 || echo "")
            if [[ -z "$PUBKEY" ]]; then
              # Fallback: patch in a dummy valid-format key so Tauri doesn't error
              PUBKEY="dW50cnVzdGVkIGNvbW1lbnQ6IG1pbmlzaWduIHB1YmxpYyBrZXkKUlVRd0FBQT0K"
              PRIVKEY="dW50cnVzdGVkIGNvbW1lbnQ6IG1pbmlzaWduIHNlY3JldCBrZXkKUlVRd0FBQT0K"
            fi
            node -e "
              const fs = require('fs');
              const cfg = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
              cfg.plugins.updater.pubkey = process.env.PUBKEY || 'dW50cnVzdGVkIGNvbW1lbnQ6IG1pbmlzaWduIHB1YmxpYyBrZXkKUlVRd0FBQT0K';
              fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(cfg, null, 2));
              console.log('Throwaway public key injected for unsigned test build.');
            "
            echo "TAURI_SIGNING_PRIVATE_KEY=$PRIVKEY" >> "$GITHUB_ENV"
          else
            echo "ERROR: TAURI_SIGNING_PUBLIC_KEY secret is not configured."
            echo "To fix: run 'pnpm tauri signer generate' locally and add the output to GitHub Secrets."
            echo "For a test build without signing, use 'Run workflow' and tick 'Build UNSIGNED test installer'."
            exit 1
          fi

      # ── macOS code signing ────────────────────────────────────────────────
      - name: Import Apple Developer certificate
        if: runner.os == 'macOS'
        continue-on-error: true
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        shell: bash
        run: |
          if [[ -z "$APPLE_CERTIFICATE" ]] || [[ -z "$APPLE_CERTIFICATE_PASSWORD" ]]; then
            echo "::warning::APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD not set — building unsigned."
            echo "APPLE_SIGNING_SKIPPED=true" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "$APPLE_CERTIFICATE" | base64 -D > /tmp/certificate.p12
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import /tmp/certificate.p12 \
            -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productbuild \
            -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm -f /tmp/certificate.p12
          echo "Apple Developer certificate imported."

      - name: Inject macOS signing identity
        if: runner.os == 'macOS' && env.APPLE_SIGNING_SKIPPED != 'true'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        shell: bash
        run: |
          if [[ -z "$APPLE_SIGNING_IDENTITY" ]]; then
            echo "::warning::APPLE_SIGNING_IDENTITY not set — skipping signing identity injection."
            exit 0
          fi
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            cfg.bundle.macOS.signingIdentity = process.env.APPLE_SIGNING_IDENTITY;
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(cfg, null, 2));
            console.log('macOS signing identity injected.');
          "

      # ── Windows code signing ──────────────────────────────────────────────
      - name: Import Windows Authenticode certificate
        if: runner.os == 'Windows'
        continue-on-error: true
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if ([string]::IsNullOrEmpty($env:WINDOWS_CERTIFICATE) -or
              [string]::IsNullOrEmpty($env:WINDOWS_CERTIFICATE_PASSWORD)) {
            Write-Host "::warning::WINDOWS_CERTIFICATE / WINDOWS_CERTIFICATE_PASSWORD not set — building unsigned."
            "WINDOWS_SIGNING_SKIPPED=true" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            exit 0
          }
          $rawBase64 = $env:WINDOWS_CERTIFICATE `
            -replace '-----BEGIN[^-]*-----', '' `
            -replace '-----END[^-]*-----',   '' `
            -replace '\s',                   ''
          $pfxPath = "$env:RUNNER_TEMP\certificate.pfx"
          [System.Convert]::FromBase64String($rawBase64) |
            Set-Content -Path $pfxPath -AsByteStream
          $securePassword = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate `
            -FilePath $pfxPath `
            -CertStoreLocation Cert:\CurrentUser\My `
            -Password $securePassword
          "WINDOWS_CERT_THUMBPRINT=$($cert.Thumbprint)" |
            Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Windows Authenticode certificate imported."
          Remove-Item -Path $pfxPath -Force

      - name: Inject Windows certificate thumbprint
        if: runner.os == 'Windows' && env.WINDOWS_SIGNING_SKIPPED != 'true' && env.WINDOWS_CERT_THUMBPRINT != ''
        shell: pwsh
        run: |
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            cfg.bundle.windows.certificateThumbprint = process.env.WINDOWS_CERT_THUMBPRINT;
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(cfg, null, 2));
            console.log('Windows certificate thumbprint injected:', process.env.WINDOWS_CERT_THUMBPRINT);
          "

      - name: Build Tauri app and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "SlalomStream ${{ github.ref_name }}"
          releaseBody: |
            See [RELEASES.md](https://github.com/${{ github.repository }}/blob/main/RELEASES.md) for full release notes.
          releaseDraft: false
          prerelease: ${{ inputs.unsigned == true }}
          args: ${{ matrix.args }}

      - name: Show Tauri build error detail
        if: failure()
        shell: bash
        run: |
          if [ -f /tmp/tauri-build-error.txt ]; then
            echo '=== Tauri build error ==='; cat /tmp/tauri-build-error.txt
          else
            echo 'No error detail file found.'
          fi

      - name: Remove temporary build keychain
        if: runner.os == 'macOS' && always()
        shell: bash
        run: |
          security delete-keychain build.keychain 2>/dev/null || true

  publish-update-manifest:
    name: Publish update.json manifest
    needs: build-tauri
    # Only run on real tag pushes — unsigned test builds don't publish updates
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Build and upload multi-platform update.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export TAG="${{ github.ref_name }}"
          export REPO="${{ github.repository }}"
          export VERSION="${TAG#v}"
          export PUB_DATE
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          mkdir -p sigs
          gh release download "$TAG" --repo "$REPO" --pattern "*.sig" --dir sigs

          ls sigs/

          node - <<'NODESCRIPT'
          const fs = require('fs');
          const path = require('path');

          const TAG = process.env.TAG;
          const REPO = process.env.REPO;
          const VERSION = process.env.VERSION;
          const PUB_DATE = process.env.PUB_DATE;

          const baseUrl = `https://github.com/${REPO}/releases/download/${TAG}/`;
          const sigFiles = fs.readdirSync('./sigs');

          function getPlatformKey(installer) {
            const hasAarch64 = /aarch64/.test(installer);
            const hasX64 = /x64|x86_64/.test(installer);

            if (hasX64 && /\.(nsis\.zip|msi\.zip|exe|msi)$/.test(installer)
                && !/\.(dmg|app\.tar\.gz)$/.test(installer)) {
              return 'windows-x86_64';
            }
            if (hasAarch64 && /\.(app\.tar\.gz|dmg)$/.test(installer)) {
              return 'darwin-aarch64';
            }
            if (hasX64 && /\.(app\.tar\.gz|dmg)$/.test(installer)) {
              return 'darwin-x86_64';
            }
            return null;
          }

          const platforms = {};

          for (const sigFile of sigFiles) {
            const installer = sigFile.replace(/\.sig$/, '');
            const platform = getPlatformKey(installer);
            if (!platform) {
              console.log(`Skipped unrecognised asset: ${installer}`);
              continue;
            }
            if (platforms[platform] &&
                !/\.(app\.tar\.gz|nsis\.zip|msi\.zip)$/.test(installer)) {
              console.log(`Skipping lower-priority asset for ${platform}: ${installer}`);
              continue;
            }
            const sig = fs.readFileSync(path.join('./sigs', sigFile), 'utf8').trim();
            const url = baseUrl + installer;
            platforms[platform] = { url, signature: sig };
            console.log(`Added platform: ${platform} → ${installer}`);
          }

          const REQUIRED = ['windows-x86_64'];
          const missing = REQUIRED.filter(p => !platforms[p]);
          if (missing.length > 0) {
            console.error('ERROR: update.json is missing required platforms:', missing);
            console.error('Available .sig files:', sigFiles);
            process.exit(1);
          }

          const manifest = {
            version: VERSION,
            notes: '',
            pub_date: PUB_DATE,
            platforms,
          };

          fs.writeFileSync('update.json', JSON.stringify(manifest, null, 2));
          console.log('Generated update.json:\n', JSON.stringify(manifest, null, 2));
          NODESCRIPT

          gh release upload "$TAG" update.json --repo "$REPO" --clobber
          echo "update.json uploaded to release $TAG"
