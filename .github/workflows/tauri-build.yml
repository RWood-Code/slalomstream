name: Tauri Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'
          - platform: macos-13
            target: x86_64-apple-darwin
            args: '--target x86_64-apple-darwin'
          - platform: windows-latest
            target: ''
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: ${{ matrix.target || 'default' }}

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      # Inject the real updater public key from GitHub Secrets into tauri.conf.json
      # at build time so the repository does not store the real key.
      # The admin must set TAURI_SIGNING_PUBLIC_KEY alongside TAURI_SIGNING_PRIVATE_KEY.
      - name: Inject updater public key
        shell: bash
        env:
          TAURI_SIGNING_PUBLIC_KEY: ${{ secrets.TAURI_SIGNING_PUBLIC_KEY }}
        run: |
          if [[ -z "$TAURI_SIGNING_PUBLIC_KEY" ]]; then
            echo "ERROR: TAURI_SIGNING_PUBLIC_KEY secret is not configured."
            echo "Generate a key pair with: pnpm tauri signer generate -w ~/.tauri/slalomstream.key"
            echo "Then add both keys as GitHub Secrets:"
            echo "  TAURI_SIGNING_PRIVATE_KEY  — private key content"
            echo "  TAURI_SIGNING_PUBLIC_KEY   — public key (one-line base64 string)"
            exit 1
          fi
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            cfg.plugins.updater.pubkey = process.env.TAURI_SIGNING_PUBLIC_KEY;
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(cfg, null, 2));
            console.log('Updater public key injected into tauri.conf.json');
          "

      - name: Build Tauri app and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'SlalomStream ${{ github.ref_name }}'
          releaseBody: |
            See [RELEASES.md](https://github.com/${{ github.repository }}/blob/main/RELEASES.md) for full release notes.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  publish-update-manifest:
    name: Publish update.json manifest
    # Runs after ALL matrix builds complete so every platform's .sig files
    # are present in the release before we construct the unified manifest.
    needs: build-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Build and upload multi-platform update.json
        # Construct update.json from the individual per-platform .sig files
        # that tauri-action uploads. This is deterministic regardless of
        # which matrix job finishes last.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export TAG="${{ github.ref_name }}"
          export REPO="${{ github.repository }}"
          export VERSION="${TAG#v}"
          export PUB_DATE
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          # Download all .sig files from the release into ./sigs/
          mkdir -p sigs
          gh release download "$TAG" --repo "$REPO" --pattern "*.sig" --dir sigs

          ls sigs/

          # Construct the platforms object from .sig files
          node - <<'NODESCRIPT'
          const fs = require('fs');
          const path = require('path');

          const TAG = process.env.TAG;
          const REPO = process.env.REPO;
          const VERSION = process.env.VERSION;
          const PUB_DATE = process.env.PUB_DATE;

          const baseUrl = `https://github.com/${REPO}/releases/download/${TAG}/`;
          const sigFiles = fs.readdirSync('./sigs');

          // Determine Tauri platform key from installer filename.
          // Tauri v2 updater uses compressed bundles (.nsis.zip, .msi.zip,
          // .app.tar.gz), NOT the raw installer (.exe/.msi/.dmg).
          // The corresponding .sig file uses the full bundle name as prefix.
          function getPlatformKey(installer) {
            const hasAarch64 = /aarch64/.test(installer);
            const hasX64 = /x64|x86_64/.test(installer);

            // Windows: NSIS/MSI zip bundles (preferred) or raw installer (fallback)
            if (hasX64 && /\.(nsis\.zip|msi\.zip|exe|msi)$/.test(installer)
                && !/\.(dmg|app\.tar\.gz)$/.test(installer)) {
              return 'windows-x86_64';
            }
            // macOS ARM
            if (hasAarch64 && /\.(app\.tar\.gz|dmg)$/.test(installer)) {
              return 'darwin-aarch64';
            }
            // macOS Intel
            if (hasX64 && /\.(app\.tar\.gz|dmg)$/.test(installer)) {
              return 'darwin-x86_64';
            }
            return null;
          }

          const platforms = {};

          for (const sigFile of sigFiles) {
            const installer = sigFile.replace(/\.sig$/, '');
            const platform = getPlatformKey(installer);
            if (!platform) {
              console.log(`Skipped unrecognised asset: ${installer}`);
              continue;
            }
            // Prefer .app.tar.gz / .nsis.zip over .dmg / .exe for the same platform
            if (platforms[platform] &&
                !/\.(app\.tar\.gz|nsis\.zip|msi\.zip)$/.test(installer)) {
              console.log(`Skipping lower-priority asset for ${platform}: ${installer}`);
              continue;
            }
            const sig = fs.readFileSync(path.join('./sigs', sigFile), 'utf8').trim();
            const url = baseUrl + installer;
            platforms[platform] = { url, signature: sig };
            console.log(`Added platform: ${platform} → ${installer}`);
          }

          // Validate that all required platform entries are present
          const REQUIRED = ['darwin-aarch64', 'darwin-x86_64', 'windows-x86_64'];
          const missing = REQUIRED.filter(p => !platforms[p]);
          if (missing.length > 0) {
            console.error('ERROR: update.json is missing required platforms:', missing);
            console.error('Available .sig files:', sigFiles);
            process.exit(1);
          }

          const manifest = {
            version: VERSION,
            notes: '',
            pub_date: PUB_DATE,
            platforms,
          };

          fs.writeFileSync('update.json', JSON.stringify(manifest, null, 2));
          console.log('Generated update.json:\n', JSON.stringify(manifest, null, 2));
          NODESCRIPT

          gh release upload "$TAG" update.json --repo "$REPO" --clobber
          echo "update.json uploaded to release $TAG"
