kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.production]
build = ["sh", "-c", "pnpm --filter @workspace/api-server run build && PORT=8080 BASE_PATH=/ pnpm --filter @workspace/slalom-stream run build"]
run = ["node", "artifacts/api-server/dist/index.cjs"]

[services.production.env]
PORT = "8080"
SERVE_STATIC = "true"
STATIC_DIR = "artifacts/slalom-stream/dist/public"

[services.production.health.startup]
path = "/api/healthz"
