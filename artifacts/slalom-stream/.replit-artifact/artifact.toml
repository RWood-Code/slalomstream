kind = "web"
previewPath = "/"
title = "SlalomStream"
version = "1.0.0"
id = "artifacts/slalom-stream"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19059
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/slalom-stream run dev"

[services.env]
PORT = "19059"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/slalom-stream", "run", "build"]
publicDir = "artifacts/slalom-stream/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
